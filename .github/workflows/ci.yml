name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==2.4.0

      - name: Install dependencies
        run: poetry install

      - name: Check lint
        run: poetry run ruff check .

      - name: Check formatting
        run: poetry run ruff format --check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==2.4.0

      - name: Install dependencies
        run: poetry install

      - name: Run unit tests
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pismo_visa
        run: poetry run pytest tests/unit -v

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==2.4.0

      - name: Install dependencies
        run: poetry install

      - name: Start test database
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for Flyway migrations
        run: |
          for i in $(seq 1 12); do
            STATUS=$(docker compose -f docker-compose.test.yml ps flyway-test --format json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['State'])" 2>/dev/null || echo "running")
            if [ "$STATUS" = "exited" ]; then break; fi
            echo "Waiting for migrations... ($i/12)"
            sleep 5
          done

      - name: Run integration tests
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pismo_visa
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5433/pismo_visa_test
        run: poetry run pytest tests/integration -v

      - name: Stop test database
        if: always()
        run: docker compose -f docker-compose.test.yml down

  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [unit-tests, integration-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pismo_visa
        run: |
          docker compose -f docker-compose.db.yml up -d
          docker compose -f docker-compose.api.yml build
          docker compose -f docker-compose.api.yml up -d

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health; then
              echo "API is up"
              break
            fi
            echo "Waiting for API... ($i/20)"
            sleep 3
          done

      - name: Run k6 load test
        env:
          BASE_URL: http://api:8000
        run: docker compose -f docker-compose.k6.yml run --rm k6

      - name: Stop full stack
        if: always()
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pismo_visa
        run: |
          docker compose -f docker-compose.api.yml down
          docker compose -f docker-compose.db.yml down
